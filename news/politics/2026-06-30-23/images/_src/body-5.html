<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR', sans-serif; }
  #card {
    width:900px;
    background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding:56px 56px 60px;
  }
  .title { font-size:38px; font-weight:900; color:#fff; margin-bottom:10px; }
  .lead { font-size:20px; color:#94a3b8; margin-bottom:42px; }
  .cols { display:flex; gap:28px; }
  .side { flex:1; border-radius:20px; padding:34px 30px; }
  .s-a { background:rgba(99,102,241,0.13); border:1px solid rgba(129,140,248,0.5); }
  .s-b { background:rgba(34,197,94,0.11); border:1px solid rgba(74,222,128,0.45); }
  .stance { font-size:27px; font-weight:900; margin-bottom:8px; }
  .a-stance { color:#a5b4fc; }
  .b-stance { color:#86efac; }
  .who { font-size:19px; color:#94a3b8; margin-bottom:26px; }
  .point { display:flex; gap:14px; margin-bottom:20px; }
  .dot { flex:0 0 12px; width:12px; height:12px; border-radius:50%; margin-top:9px; }
  .a-dot { background:#818cf8; }
  .b-dot { background:#4ade80; }
  .ptxt { font-size:21px; color:#dbe2ee; line-height:1.55; word-break:keep-all; }
  .vs { display:flex; align-items:center; justify-content:center;
    flex:0 0 60px; }
  .vsbadge { width:60px; height:60px; border-radius:50%;
    background:rgba(255,255,255,0.08); border:1px solid rgba(203,213,225,0.4);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:900; color:#cbd5e1; align-self:center; }
  .wrap { display:flex; align-items:stretch; gap:0; }
</style>
</head>
<body>
  <div id="card">
    <div class="title">두 갈래의 시선</div>
    <div class="lead">효율이냐, 투표권이냐</div>
    <div class="wrap">
      <div class="side s-a">
        <div class="stance a-stance">효율 · 신뢰</div>
        <div class="who">지침 변경 옹호</div>
        <div class="point"><div class="dot a-dot"></div><div class="ptxt">사전투표가 늘면 본투표 수요는 줄어든다</div></div>
        <div class="point"><div class="dot a-dot"></div><div class="ptxt">잔여 용지를 줄이면 음모론의 빌미도 준다</div></div>
        <div class="point"><div class="dot a-dot"></div><div class="ptxt">자원 낭비를 막자는 취지</div></div>
      </div>
      <div class="vs"><div class="vsbadge">VS</div></div>
      <div class="side s-b">
        <div class="stance b-stance">투표권 보장</div>
        <div class="who">지침 변경 비판</div>
        <div class="point"><div class="dot b-dot"></div><div class="ptxt">우선은 '모두가 빠짐없이 투표할 수 있는가'</div></div>
        <div class="point"><div class="dot b-dot"></div><div class="ptxt">단 한 명도 용지 부족으로 못 하면 안 된다</div></div>
        <div class="point"><div class="dot b-dot"></div><div class="ptxt">효율보다 선거의 근간이 먼저다</div></div>
      </div>
    </div>
  </div>
</body>
</html>
