<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR', sans-serif; }
  #card {
    width:900px;
    background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding:60px 60px 64px; position:relative; overflow:hidden;
  }
  .acc { position:absolute; top:-90px; right:-90px; width:280px; height:280px;
    border-radius:50%; background:rgba(99,102,241,0.12); }
  .tag { display:inline-block; font-size:19px; font-weight:700; letter-spacing:2px;
    color:#818cf8; border:1px solid rgba(129,140,248,0.4); border-radius:30px;
    padding:8px 22px; margin-bottom:34px; }
  .quotebox {
    border-left:6px solid #6366f1; padding-left:34px; }
  .qmark { font-size:90px; font-weight:900; color:#4338ca; line-height:0.7;
    margin-bottom:6px; }
  .quote { font-size:34px; font-weight:700; color:#f1f5f9; line-height:1.5;
    word-break:keep-all; }
  .quote .em { color:#a5b4fc; }
  .stats { display:flex; gap:24px; margin-top:46px; }
  .st { flex:1; background:rgba(255,255,255,0.05);
    border:1px solid rgba(148,163,184,0.25); border-radius:16px;
    padding:26px 24px; text-align:center; }
  .v { font-size:50px; font-weight:900; color:#a5b4fc; }
  .l { font-size:19px; color:#a8b2c4; margin-top:8px; line-height:1.4; word-break:keep-all; }
</style>
</head>
<body>
  <div id="card">
    <div class="acc"></div>
    <div class="tag">본투표 당일 현장</div>
    <div class="quotebox">
      <div class="qmark">"</div>
      <div class="quote">일부 투표소에서 <span class="em">용지가 모자라</span><br>투표가 잠시 멈췄다 다시 시작됐다</div>
    </div>
    <div class="stats">
      <div class="st">
        <div class="v">약 50곳</div>
        <div class="l">실제 용지 부족<br>(한 보도 기준)</div>
      </div>
      <div class="st">
        <div class="v">22곳</div>
        <div class="l">투표가 멈췄다<br>재개된 곳</div>
      </div>
    </div>
  </div>
</body>
</html>
