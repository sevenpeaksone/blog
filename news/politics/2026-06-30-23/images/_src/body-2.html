<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR', sans-serif; }
  #card {
    width:900px;
    background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding:56px 60px 60px;
  }
  .title { font-size:38px; font-weight:900; color:#fff; margin-bottom:10px; }
  .lead { font-size:20px; color:#94a3b8; margin-bottom:44px; }
  .stats { display:flex; gap:30px; margin-bottom:46px; }
  .stat { flex:1; border-radius:20px; padding:34px 30px; text-align:center; }
  .s-dem { background:rgba(59,130,246,0.16); border:1px solid rgba(59,130,246,0.5); }
  .s-ppp { background:rgba(220,38,38,0.14); border:1px solid rgba(239,68,68,0.45); }
  .party { font-size:24px; font-weight:700; margin-bottom:14px; }
  .p-dem { color:#93c5fd; }
  .p-ppp { color:#fca5a5; }
  .cnt { font-size:78px; font-weight:900; color:#fff; line-height:1; }
  .unit { font-size:24px; color:#cbd5e1; margin-top:10px; }
  /* bar */
  .barwrap { margin-bottom:34px; }
  .barlabel { font-size:20px; color:#cbd5e1; margin-bottom:12px; }
  .bar { display:flex; height:46px; border-radius:12px; overflow:hidden; }
  .b-dem { width:75%; background:linear-gradient(90deg,#3b82f6,#60a5fa);
    display:flex; align-items:center; padding-left:22px;
    font-size:22px; font-weight:700; color:#fff; }
  .b-ppp { width:25%; background:linear-gradient(90deg,#dc2626,#f87171);
    display:flex; align-items:center; justify-content:flex-end; padding-right:22px;
    font-size:22px; font-weight:700; color:#fff; }
  .note { font-size:21px; color:#a8b2c4; line-height:1.6; word-break:keep-all;
    border-top:1px solid rgba(148,163,184,0.25); padding-top:26px; }
  .note .hl { color:#a5b4fc; font-weight:700; }
</style>
</head>
<body>
  <div id="card">
    <div class="title">광역단체장 16곳 결과</div>
    <div class="lead">제9회 전국동시지방선거 · 광역자치단체장</div>
    <div class="stats">
      <div class="stat s-dem">
        <div class="party p-dem">더불어민주당</div>
        <div class="cnt">12</div>
        <div class="unit">곳</div>
      </div>
      <div class="stat s-ppp">
        <div class="party p-ppp">국민의힘</div>
        <div class="cnt">4</div>
        <div class="unit">곳</div>
      </div>
    </div>
    <div class="barwrap">
      <div class="barlabel">전체 16곳 중 점유</div>
      <div class="bar">
        <div class="b-dem">민주 12</div>
        <div class="b-ppp">국힘 4</div>
      </div>
    </div>
    <div class="note">민주당이 광역 단위에서 크게 앞섰지만 <span class="hl">서울시장 선거는 패배</span>해, 여러 매체가 '절반의 승리'로 평가했습니다.</div>
  </div>
</body>
</html>
