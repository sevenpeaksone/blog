<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR', sans-serif; }
  #card {
    width:900px;
    background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding:56px 60px 60px;
  }
  .title { font-size:38px; font-weight:900; color:#fff; margin-bottom:10px; }
  .lead { font-size:20px; color:#94a3b8; margin-bottom:54px; }
  .chart { display:flex; align-items:flex-end; justify-content:center;
    gap:90px; height:360px; padding:0 40px;
    border-bottom:2px solid rgba(148,163,184,0.3); margin-bottom:30px; }
  .col { display:flex; flex-direction:column; align-items:center;
    justify-content:flex-end; height:100%; }
  .barval { font-size:30px; font-weight:900; color:#e2e8f0; margin-bottom:14px; }
  .barv .barval { color:#a5b4fc; }
  .bar { width:150px; border-radius:14px 14px 0 0; }
  .b-old { height:320px; background:linear-gradient(180deg,#475569,#334155); }
  .b-new { height:228px; background:linear-gradient(180deg,#6366f1,#3b82f6); }
  .xlabel { margin-top:18px; font-size:22px; font-weight:700; color:#cbd5e1;
    text-align:center; }
  .arrow { display:flex; align-items:center; justify-content:center; gap:16px;
    margin-top:14px; font-size:24px; font-weight:700; color:#a5b4fc; }
  .arrow .down { font-size:30px; color:#f87171; }
  .foot { font-size:21px; color:#a8b2c4; line-height:1.6; word-break:keep-all;
    border-top:1px solid rgba(148,163,184,0.25); padding-top:24px; margin-top:30px; }
</style>
</head>
<body>
  <div id="card">
    <div class="title">본투표용지 인쇄 비율 변화</div>
    <div class="lead">선거인 수 대비 인쇄 비율 · 중앙선관위 지침</div>
    <div class="chart">
      <div class="col">
        <div class="barval">60~70%</div>
        <div class="bar b-old"></div>
        <div class="xlabel">기존 기준</div>
      </div>
      <div class="col barv">
        <div class="barval">50%</div>
        <div class="bar b-new"></div>
        <div class="xlabel">이번 선거</div>
      </div>
    </div>
    <div class="arrow"><span class="down">▼</span> 최대 50%까지 낮춰 인쇄 가능하도록 변경</div>
    <div class="foot">사전투표 수요 증가, 잔여 용지의 음모론 악용 차단이 명분이었지만, 예측이 빗나간 일부 지역에서 부족 사태로 이어졌습니다.</div>
  </div>
</body>
</html>
