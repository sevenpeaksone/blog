<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR', sans-serif; }
  #card {
    width:900px;
    background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    padding:56px 56px 60px;
  }
  .title { font-size:38px; font-weight:900; color:#ffffff; margin-bottom:14px; }
  .title .em { color:#818cf8; }
  .lead { font-size:20px; color:#94a3b8; margin-bottom:40px; }
  .cards { display:flex; flex-direction:column; gap:22px; }
  .row {
    display:flex; align-items:flex-start; gap:26px;
    background:rgba(255,255,255,0.05); border:1px solid rgba(129,140,248,0.25);
    border-radius:18px; padding:30px 32px;
  }
  .num {
    flex:0 0 64px; width:64px; height:64px; border-radius:16px;
    background:linear-gradient(135deg,#6366f1,#3b82f6);
    display:flex; align-items:center; justify-content:center;
    font-size:34px; font-weight:900; color:#fff;
  }
  .txt { flex:1; }
  .head { font-size:26px; font-weight:700; color:#e2e8f0; margin-bottom:8px; }
  .desc { font-size:21px; color:#a8b2c4; line-height:1.55; word-break:keep-all; }
  .big { color:#a5b4fc; font-weight:700; }
</style>
</head>
<body>
  <div id="card">
    <div class="title">한눈에 보는 <span class="em">핵심 3줄</span></div>
    <div class="lead">6·3 지방선거 투표용지 부족 사태</div>
    <div class="cards">
      <div class="row">
        <div class="num">1</div>
        <div class="txt">
          <div class="head">역대 두 번째로 높은 투표율</div>
          <div class="desc">2026년 6월 3일 제9회 전국동시지방선거, 투표율 약 <span class="big">61%</span></div>
        </div>
      </div>
      <div class="row">
        <div class="num">2</div>
        <div class="txt">
          <div class="head">본투표 당일 용지 부족</div>
          <div class="desc">일부 투표소에서 용지가 모자라 투표가 잠시 멈췄다 재개</div>
        </div>
      </div>
      <div class="row">
        <div class="num">3</div>
        <div class="txt">
          <div class="head">인쇄량 축소 지침이 배경</div>
          <div class="desc">선관위 지침 변경, 사후 기록·책임 문제로 논란 지속</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
