<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Noto Sans KR', sans-serif; }
  #card {
    width:1080px; height:1080px;
    background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    position:relative; overflow:hidden;
    padding:90px;
  }
  /* accent shapes */
  .acc1 { position:absolute; top:-120px; left:-120px; width:360px; height:360px;
    border-radius:50%; background:rgba(99,102,241,0.16); }
  .acc2 { position:absolute; bottom:-140px; right:-100px; width:420px; height:420px;
    border-radius:50%; background:rgba(59,130,246,0.12); }
  .ballot { position:absolute; bottom:70px; right:80px;
    width:120px; height:150px; border:5px solid rgba(148,163,184,0.5);
    border-radius:10px; }
  .ballot::before { content:""; position:absolute; top:26px; left:22px;
    width:70px; height:8px; background:rgba(148,163,184,0.5); border-radius:4px; }
  .ballot::after { content:""; position:absolute; top:50px; left:22px;
    width:50px; height:8px; background:rgba(148,163,184,0.5); border-radius:4px; }
  .cat { font-size:34px; font-weight:700; letter-spacing:6px;
    color:#818cf8; margin-bottom:40px; }
  .badge { display:inline-block; font-size:30px; font-weight:700;
    color:#cbd5e1; border:2px solid rgba(203,213,225,0.4);
    border-radius:40px; padding:12px 36px; margin-bottom:50px; }
  h1 { font-size:84px; font-weight:900; color:#ffffff;
    line-height:1.32; text-align:center; word-break:keep-all; }
  .sub { margin-top:54px; font-size:38px; font-weight:400;
    color:#94a3b8; text-align:center; line-height:1.5; word-break:keep-all; }
  .em { color:#a5b4fc; }
</style>
</head>
<body>
  <div id="card">
    <div class="acc1"></div>
    <div class="acc2"></div>
    <div class="ballot"></div>
    <div class="cat">NEWS · 정치 / 사회</div>
    <div class="badge">뉴스 해설</div>
    <h1>6·3 지방선거<br><span class="em">투표용지 부족</span> 사태</h1>
    <div class="sub">무슨 일이 있었나,<br>왜 중요한가</div>
  </div>
</body>
</html>
