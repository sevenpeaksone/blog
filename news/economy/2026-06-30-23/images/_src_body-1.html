<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans KR', sans-serif; }
  #card { width:960px; background:#16213e; padding:54px 60px 60px; color:#fff; }
  .title { font-size:38px; font-weight:900; margin-bottom:8px; }
  .title .hl { color:#ff6b8a; }
  .desc { font-size:20px; color:#9fb3d9; margin-bottom:34px; font-weight:400; }
  .chartwrap { background:#1f2c4d; border-radius:16px; padding:34px 30px 26px; }
  .legend { display:flex; gap:26px; margin-top:24px; justify-content:center; }
  .lg { display:flex; align-items:center; gap:10px; font-size:18px; color:#c7d2e8; }
  .dot { width:16px; height:16px; border-radius:50%; }
</style></head>
<body>
  <div id="card">
    <div class="title">2026 상반기 <span class="hl">원달러 환율</span> 추이</div>
    <div class="desc">단위: 원 / 달러 · 장중 고점 기준</div>
    <div class="chartwrap">
      <svg viewBox="0 0 840 420" width="840" height="420">
        <line x1="90" y1="40" x2="810" y2="40" stroke="#33436b" stroke-width="1"/>
        <line x1="90" y1="130" x2="810" y2="130" stroke="#33436b" stroke-width="1"/>
        <line x1="90" y1="220" x2="810" y2="220" stroke="#33436b" stroke-width="1"/>
        <line x1="90" y1="310" x2="810" y2="310" stroke="#33436b" stroke-width="1"/>
        <text x="78" y="46" fill="#7e8cb0" font-size="17" text-anchor="end">1,570</text>
        <text x="78" y="136" fill="#7e8cb0" font-size="17" text-anchor="end">1,550</text>
        <text x="78" y="226" fill="#7e8cb0" font-size="17" text-anchor="end">1,530</text>
        <text x="78" y="316" fill="#7e8cb0" font-size="17" text-anchor="end">1,510</text>
        <line x1="90" y1="135" x2="810" y2="135" stroke="#f0b45b" stroke-width="2.5" stroke-dasharray="9 7"/>
        <text x="96" y="123" fill="#f0b45b" font-size="16" text-anchor="start">2009년 금융위기 고점 1,549원</text>
        <polyline points="150,220 410,73 600,130 760,135" fill="none" stroke="#ff6b8a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="150" cy="220" r="9" fill="#ff6b8a"/>
        <circle cx="410" cy="73" r="9" fill="#ff6b8a"/>
        <circle cx="600" cy="130" r="9" fill="#ff6b8a"/>
        <circle cx="760" cy="135" r="11" fill="#fff" stroke="#ff6b8a" stroke-width="5"/>
        <text x="150" y="250" fill="#fff" font-size="19" font-weight="700" text-anchor="middle">1,530</text>
        <text x="410" y="56" fill="#fff" font-size="19" font-weight="700" text-anchor="middle">1,562</text>
        <text x="600" y="113" fill="#fff" font-size="19" font-weight="700" text-anchor="middle">1,550</text>
        <text x="760" y="170" fill="#fff" font-size="20" font-weight="900" text-anchor="middle">1,550</text>
        <text x="150" y="360" fill="#9fb3d9" font-size="18" text-anchor="middle">3월</text>
        <text x="410" y="360" fill="#9fb3d9" font-size="18" text-anchor="middle">6/5 야간</text>
        <text x="600" y="360" fill="#9fb3d9" font-size="18" text-anchor="middle">6/26</text>
        <text x="760" y="360" fill="#9fb3d9" font-size="18" text-anchor="middle">6/30</text>
      </svg>
      <div class="legend">
        <div class="lg"><span class="dot" style="background:#ff6b8a"></span>2026년 원달러 환율</div>
        <div class="lg"><span class="dot" style="background:#f0b45b"></span>2009년 금융위기 기준선</div>
      </div>
    </div>
  </div>
</body></html>
