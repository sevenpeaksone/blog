<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans KR', sans-serif; }
  #card { width:960px; background:#16213e; padding:54px 56px 58px; color:#fff; }
  .title { font-size:36px; font-weight:900; text-align:center; margin-bottom:8px; }
  .title .hl { color:#ff6b8a; }
  .sub { font-size:20px; color:#9fb3d9; text-align:center; margin-bottom:42px; }
  .cards { display:flex; gap:26px; }
  .c { flex:1; background:#1f2c4d; border-radius:18px; padding:34px 24px 30px; text-align:center;
    border-top:5px solid #ff6b8a; }
  .icon { width:120px; height:120px; margin:0 auto 24px; position:relative; }
  .ct { font-size:24px; font-weight:800; margin-bottom:12px; }
  .cd { font-size:18px; color:#9fb3d9; line-height:1.55; }
  .up { display:inline-block; margin-top:18px; background:#ff6b8a; color:#16213e; font-weight:900;
    font-size:17px; padding:7px 18px; border-radius:20px; }
  .basket { width:108px; height:74px; border:6px solid #ffb3c4; border-radius:0 0 18px 18px; position:absolute; bottom:6px; left:6px; }
  .basket:before { content:""; position:absolute; width:54px; height:34px; border:6px solid #ffb3c4; border-bottom:none; border-radius:30px 30px 0 0; top:-34px; left:21px; }
  .pump { width:62px; height:96px; background:#5b8def; border-radius:8px; position:absolute; left:18px; top:8px; }
  .pump:before { content:""; position:absolute; width:36px; height:30px; background:#16213e; border-radius:5px; top:14px; left:13px; }
  .pump:after { content:""; position:absolute; width:30px; height:8px; background:#5b8def; right:-26px; top:18px; border-radius:4px; }
  .box { width:96px; height:80px; background:#f0b45b; border-radius:8px; position:absolute; left:12px; top:24px; }
  .box:before { content:""; position:absolute; width:96px; height:14px; background:#d99a3f; top:0; left:0; border-radius:8px 8px 0 0; }
  .box:after { content:""; position:absolute; width:8px; height:80px; background:#d99a3f; left:44px; top:0; }
</style></head>
<body>
  <div id="card">
    <div class="title">환율이 오르면 <span class="hl">같이 오르는 것들</span></div>
    <div class="sub">멀리 있는 숫자가 아니라, 우리 지갑의 이야기</div>
    <div class="cards">
      <div class="c">
        <div class="icon"><div class="basket"></div></div>
        <div class="ct">장바구니 물가</div>
        <div class="cd">수입 원자재가 비싸지며<br>먹거리 가격 상승</div>
        <div class="up">소비자물가 3.1%</div>
      </div>
      <div class="c">
        <div class="icon"><div class="pump"></div></div>
        <div class="ct">주유·연료비</div>
        <div class="cd">수입 의존도 높은 에너지<br>가격이 환율 따라 상승</div>
        <div class="up">원가 부담 증가</div>
      </div>
      <div class="c">
        <div class="icon"><div class="box"></div></div>
        <div class="ct">해외 직구</div>
        <div class="cd">달러 결제 비용이 올라<br>해외 구매 부담 가중</div>
        <div class="up">가계 시름 심화</div>
      </div>
    </div>
  </div>
</body></html>
