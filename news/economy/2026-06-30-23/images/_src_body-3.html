<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans KR', sans-serif; }
  #card { width:960px; background:#16213e; padding:52px 56px 56px; color:#fff; }
  .title { font-size:36px; font-weight:900; text-align:center; margin-bottom:6px; }
  .title .hl { color:#ff6b8a; }
  .sub { font-size:20px; color:#9fb3d9; text-align:center; margin-bottom:38px; }
  .row { display:flex; gap:28px; align-items:stretch; }
  .panel { flex:1; border-radius:18px; padding:34px 30px; }
  .left { background:#163a2e; border:1px solid #2e6b4f; }
  .right { background:#3a1f2a; border:1px solid #6b3445; }
  .ptag { font-size:21px; font-weight:700; margin-bottom:30px; }
  .left .ptag { color:#4fd99a; }
  .right .ptag { color:#ff7d9c; }
  .bars { display:flex; align-items:flex-end; gap:34px; height:230px; padding:0 14px; }
  .b { flex:1; border-radius:10px 10px 0 0; position:relative; }
  .bval { position:absolute; top:-36px; left:50%; transform:translateX(-50%); font-size:20px; font-weight:900; white-space:nowrap; }
  .bcap { position:absolute; bottom:-38px; left:50%; transform:translateX(-50%); font-size:17px; color:#c7d2e8; white-space:nowrap; }
  .vs { display:flex; align-items:center; justify-content:center; }
  .vscircle { width:74px; height:74px; border-radius:50%; background:#16213e; border:3px solid #5b6b8f;
    display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:900; color:#c7d2e8; }
  .single { display:flex; flex-direction:column; align-items:center; justify-content:center; height:230px; }
  .bignum { font-size:92px; font-weight:900; color:#ff6b8a; line-height:1; }
  .bignum span { font-size:40px; }
  .arrowdown { font-size:24px; color:#ff6b8a; font-weight:900; margin-top:10px; }
  .cap { text-align:center; margin-top:56px; font-size:26px; font-weight:800; }
  .cap .g { color:#4fd99a; } .cap .r { color:#ff7d9c; }
</style></head>
<body>
  <div id="card">
    <div class="title">강한 펀더멘털 <span class="hl">vs</span> 약한 원화</div>
    <div class="sub">실물 지표는 사상 최대인데, 원화 가치는 17년 만의 최저</div>
    <div class="row">
      <div class="panel left">
        <div class="ptag">누적 무역흑자 (1~5월)</div>
        <div class="bars">
          <div class="b" style="height:55%; background:#2e6b4f;">
            <div class="bval" style="color:#8fe3bd;">952억$</div>
            <div class="bcap">2017년 연간</div>
          </div>
          <div class="b" style="height:100%; background:linear-gradient(180deg,#4fd99a,#2e6b4f);">
            <div class="bval" style="color:#fff;">1,019억$</div>
            <div class="bcap">2026년 5개월</div>
          </div>
        </div>
      </div>
      <div class="vs"><div class="vscircle">VS</div></div>
      <div class="panel right">
        <div class="ptag">원달러 환율</div>
        <div class="single">
          <div class="bignum">1,550<span>원</span></div>
          <div class="arrowdown">원화 가치 하락</div>
        </div>
      </div>
    </div>
    <div class="cap"><span class="g">수출은 사상 최대</span>, 그런데 <span class="r">원화는 약세</span></div>
  </div>
</body></html>
