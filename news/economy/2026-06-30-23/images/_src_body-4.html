<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans KR', sans-serif; }
  #card { width:960px; background:#16213e; padding:54px 56px 58px; color:#fff; }
  .title { font-size:36px; font-weight:900; text-align:center; margin-bottom:8px; }
  .sub { font-size:20px; color:#9fb3d9; text-align:center; margin-bottom:44px; }
  .flow { display:flex; align-items:center; gap:0; }
  .causes { display:flex; flex-direction:column; gap:22px; flex:1; }
  .cause { background:#1f2c4d; border-left:6px solid #5b8def; border-radius:12px; padding:20px 24px; }
  .cause .n { display:inline-block; width:34px; height:34px; line-height:34px; text-align:center;
    background:#5b8def; color:#16213e; border-radius:50%; font-weight:900; font-size:18px; margin-right:14px; }
  .cause .t { font-size:23px; font-weight:700; vertical-align:middle; }
  .cause .d { font-size:17px; color:#9fb3d9; margin-top:10px; margin-left:48px; }
  .c2 { border-left-color:#c46bf0; } .c2 .n { background:#c46bf0; }
  .c3 { border-left-color:#f0b45b; } .c3 .n { background:#f0b45b; }
  .arrows { width:120px; display:flex; align-items:center; justify-content:center; }
  .result { flex:0 0 250px; background:linear-gradient(160deg,#3a1f2a,#5a2436); border:2px solid #ff6b8a;
    border-radius:18px; padding:40px 26px; text-align:center; }
  .result .rt { font-size:21px; color:#ffb3c4; font-weight:600; margin-bottom:14px; }
  .result .rb { font-size:46px; font-weight:900; color:#ff6b8a; line-height:1.2; }
</style></head>
<body>
  <div id="card">
    <div class="title">원화 약세, 세 가지가 겹쳤다</div>
    <div class="sub">한 가지가 아니라 세 요인이 동시에 작용</div>
    <div class="flow">
      <div class="causes">
        <div class="cause"><span class="n">1</span><span class="t">한·미 금리 격차</span>
          <div class="d">한국 2.5% 8연속 동결, 미국이 더 높아 달러로 자금 이동</div></div>
        <div class="cause c2"><span class="n">2</span><span class="t">외국인 자금 이탈</span>
          <div class="d">주식 매도 후 원화를 달러로 환전, 달러 수요 증가</div></div>
        <div class="cause c3"><span class="n">3</span><span class="t">글로벌 강달러</span>
          <div class="d">중동발 지정학 불안으로 안전자산 달러 강세</div></div>
      </div>
      <div class="arrows">
        <svg viewBox="0 0 120 260" width="120" height="260">
          <path d="M10 40 L95 125" stroke="#5b8def" stroke-width="6" stroke-linecap="round"/>
          <path d="M10 130 L95 130" stroke="#c46bf0" stroke-width="6" stroke-linecap="round"/>
          <path d="M10 220 L95 135" stroke="#f0b45b" stroke-width="6" stroke-linecap="round"/>
          <polygon points="95,118 112,130 95,142" fill="#fff"/>
        </svg>
      </div>
      <div class="result">
        <div class="rt">결과</div>
        <div class="rb">원화<br>약세</div>
      </div>
    </div>
  </div>
</body></html>
