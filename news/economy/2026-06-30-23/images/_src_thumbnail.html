<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans KR', sans-serif; }
  #card { width:1080px; height:1080px;
    background:linear-gradient(145deg,#1a1a2e 0%,#16213e 100%);
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    position:relative; overflow:hidden; padding:90px; }
  .ring { position:absolute; border-radius:50%; opacity:0.18; }
  .r1 { width:520px; height:520px; border:3px solid #5b8def; top:-160px; right:-150px; }
  .r2 { width:360px; height:360px; border:3px solid #c46bf0; bottom:-120px; left:-110px; }
  .cat { color:#9fb3d9; font-size:30px; font-weight:500; letter-spacing:8px;
    margin-bottom:42px; border:1px solid #3a4a6b; padding:12px 30px; border-radius:40px; }
  .big { color:#fff; font-weight:900; font-size:118px; line-height:1.05; text-align:center; letter-spacing:-2px; }
  .big .hl { color:#ff6b8a; }
  .sub { color:#c7d2e8; font-size:40px; font-weight:500; text-align:center; margin-top:50px; line-height:1.5; }
  .badge { margin-top:64px; background:#ff6b8a; color:#1a1a2e; font-weight:900; font-size:34px; padding:18px 44px; border-radius:14px; letter-spacing:1px; }
</style></head>
<body>
  <div id="card">
    <div class="ring r1"></div><div class="ring r2"></div>
    <div class="cat">경제 뉴스 해설</div>
    <div class="big">원달러 환율<br><span class="hl">1,550원</span> 돌파</div>
    <div class="sub">수출은 사상 최대인데<br>왜 원화는 약할까</div>
    <div class="badge">17년 3개월 만의 최고</div>
  </div>
</body></html>
