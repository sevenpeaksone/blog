<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans KR', sans-serif; }
  #card { width:900px; height:560px;
    background:linear-gradient(160deg,#1a1a2e 0%,#2a1f3e 100%);
    color:#fff; display:flex; flex-direction:column; justify-content:center; align-items:center;
    position:relative; overflow:hidden; }
  .bar { position:absolute; left:0; top:0; height:100%; width:14px; background:#ff6b8a; }
  .label { font-size:28px; color:#9fb3d9; letter-spacing:4px; font-weight:500; margin-bottom:10px; }
  .num { font-size:200px; font-weight:900; line-height:1; letter-spacing:-4px;
    background:linear-gradient(180deg,#fff 0%,#ff9fb3 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .unit { font-size:64px; font-weight:700; -webkit-text-fill-color:#ff6b8a; }
  .caption { margin-top:40px; font-size:34px; font-weight:700; color:#e6ecf7; }
  .caption .hl { color:#f0b45b; }
  .sub2 { margin-top:14px; font-size:22px; color:#8e9cc0; }
</style></head>
<body>
  <div id="card">
    <div class="bar"></div>
    <div class="label">6월 30일 장중 고점</div>
    <div class="num">1,550<span class="unit">원</span></div>
    <div class="caption"><span class="hl">2009년 3월</span> 이후 17년 3개월 만</div>
    <div class="sub2">글로벌 금융위기 직후 고점에 다시 도달</div>
  </div>
</body></html>
